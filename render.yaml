# FarmSmart — Render infrastructure-as-code
# Docs: https://render.com/docs/blueprint-spec
#
# Three services:
#   1. farmsmart-api          — Express API (Web Service, $7/mo starter)
#   2. farmsmart-dashboard    — admin SPA (Web Service, vite preview)
#   3. farmsmart-recommender  — Python/FastAPI recommender (Web Service, $7/mo starter)
# Postgres is external (Neon) — set NEON_DATABASE_URL. Auth is Clerk.
#
# FIRST-DEPLOY ORDER:
#   1. Deploy the API service; note its URL (Render assigns <name>.onrender.com,
#      suffixed if the bare name is taken, e.g. https://farmsmart-api-j3qt.onrender.com).
#   2. Set the dashboard's VITE_API_BASE_URL env var to that API URL.
#   3. Set the API's CORS_ORIGIN env var to the dashboard URL.
#   4. Add both URLs to Clerk's allowed origins.
#   5. Deploy the dashboard service.

services:
  # ── API server ────────────────────────────────────────────────────────────
  - type: web
    name: farmsmart-api
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm i -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEON_DATABASE_URL
        sync: false # Neon connection string (postgresql://...?sslmode=require)
      - key: DATABASE_URL
        sync: false # same Neon URL (fallback)
      - key: CLERK_SECRET_KEY
        sync: false # sk_test_... (dev) or sk_live_... (prod)
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false # dashboard URL, e.g. https://farmsmart-dashboard.onrender.com
      - key: FACILITY_TIMEZONE
        value: America/New_York # §1.5 rule 1 — facility-local date_trunc / window bounds
      - key: QBO_CLIENT_ID
        sync: false # Intuit Developer app Client ID (sandbox or production)
      - key: QBO_CLIENT_SECRET
        sync: false # Intuit Developer app Client Secret
      - key: QBO_REDIRECT_URI
        sync: false # must exactly match a Redirect URI listed in the Intuit app's
                     # Keys & OAuth settings, e.g. https://farmsmart-api-j3qt.onrender.com/api/accounting/callback
      - key: QBO_ENVIRONMENT
        value: sandbox # "sandbox" or "production" — switch only after end-to-end testing
      - key: ACCOUNTING_ENCRYPTION_KEY
        sync: false # random 32+ char secret for AES-256-GCM token-at-rest encryption
                     # generate once with: openssl rand -base64 32
      - key: RECOMMENDER_URL
        sync: false # farmsmart-recommender's internal Render URL, e.g.
                     # https://farmsmart-recommender.onrender.com
      - key: RECOMMENDER_INTERNAL_KEY
        sync: false # shared secret with farmsmart-recommender's INTERNAL_API_KEY —
                     # generate once with: openssl rand -base64 32 (same value on both services)

  # ── Admin dashboard SPA (Web Service, vite preview) ───────────────────────
  # Served via `vite preview` (SPA fallback handled by vite's default appType=spa).
  # Free web service spins down after inactivity; first hit re-awakens (~30s).
  - type: web
    name: farmsmart-dashboard
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm i -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/admin-dashboard run build
    startCommand: pnpm --filter @workspace/admin-dashboard serve
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000" # vite.config requires PORT at build time; Render injects runtime PORT
      - key: BASE_PATH
        value: / # SPA served at root
      - key: VITE_API_BASE_URL
        sync: false # API URL, e.g. https://farmsmart-api-j3qt.onrender.com
      - key: VITE_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false # pk_test_... (dev) or pk_live_... (prod)

  # ── Recommender (Python/FastAPI, dlt ingestion + pgvector search) ─────────
  # Talks to the same Neon Postgres as farmsmart-api (DATABASE_URL). Only
  # farmsmart-api calls this service directly (INTERNAL_API_KEY-gated) — it
  # is not exposed to the dashboard or the public internet.
  - type: web
    name: farmsmart-recommender
    runtime: python
    plan: starter
    region: oregon
    buildCommand: cd artifacts/recommender-svc && pip install uv && uv sync --frozen
    startCommand: cd artifacts/recommender-svc && uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false # same Neon connection string as farmsmart-api
      - key: GEMINI_API_KEY
        sync: false # aistudio.google.com — used for gemini-embedding-001
      - key: TAVILY_API_KEY
        sync: false # tavily.com — live search on a cache miss (free tier: 1,000 credits/mo)
      - key: INTERNAL_API_KEY
        sync: false # shared secret with farmsmart-api's RECOMMENDER_INTERNAL_KEY —
                     # same value as that key, generated once via: openssl rand -base64 32
