openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FarmEasy API - Indoor farm cycle management
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard stats
  - name: cycles
    description: Crop cycle operations
  - name: growth-profiles
    description: Growth profile master data
  - name: seed-lots
    description: Seed lot lookup
  - name: alerts
    description: Alert management
  - name: inventory
    description: Inventory management
  - name: shipments
    description: Shipment tracking
  - name: bad-trays
    description: Bad tray analysis
  - name: layout
    description: Facility layout management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /growth-profiles:
    get:
      operationId: listGrowthProfiles
      tags: [growth-profiles]
      summary: List all growth profiles
      responses:
        "200":
          description: List of growth profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GrowthProfile"

  /seed-lots/lookup:
    get:
      operationId: lookupSeedLot
      tags: [seed-lots]
      summary: Look up a seed lot by QR code
      parameters:
        - name: qrCode
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Seed lot found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeedLot"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cycles:
    get:
      operationId: listCycles
      tags: [cycles]
      summary: List cycles
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [ongoing, history]
            default: ongoing
      responses:
        "200":
          description: List of cycles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Cycle"
    post:
      operationId: createCycle
      tags: [cycles]
      summary: Create a new cycle (seeding)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCycleRequest"
      responses:
        "201":
          description: Cycle created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cycle"

  /cycles/{id}:
    get:
      operationId: getCycle
      tags: [cycles]
      summary: Get cycle detail with manual checks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cycle detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CycleDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cycles/{id}/fertigation:
    post:
      operationId: moveCycleToFertigation
      tags: [cycles]
      summary: Move cycle from germination to fertigation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveFertigationRequest"
      responses:
        "200":
          description: Cycle moved to fertigation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cycle"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cycles/{id}/harvest:
    post:
      operationId: completeCycleHarvest
      tags: [cycles]
      summary: Complete harvest for a cycle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteHarvestRequest"
      responses:
        "200":
          description: Cycle harvest completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cycle"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cycles/{id}/manual-checks:
    get:
      operationId: listManualChecks
      tags: [cycles]
      summary: List manual checks for a cycle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of manual checks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ManualCheck"
    post:
      operationId: createManualCheck
      tags: [cycles]
      summary: Create a manual check for a cycle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateManualCheckRequest"
      responses:
        "201":
          description: Manual check created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManualCheck"

  /alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List alerts by status
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [current, resolved, dismissed]
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"
    post:
      operationId: createAlert
      tags: [alerts]
      summary: Create a new alert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertInput"
      responses:
        "201":
          description: Alert created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"

  /alerts/{id}:
    patch:
      operationId: updateAlertStatus
      tags: [alerts]
      summary: Resolve or dismiss an alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertStatusUpdate"
      responses:
        "200":
          description: Alert updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /alerts/{id}/action:
    post:
      operationId: takeAlertAction
      tags: [alerts]
      summary: Take action on an alert (resolves it)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertActionInput"
      responses:
        "200":
          description: Alert resolved with action
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /inventory:
    get:
      operationId: listInventory
      tags: [inventory]
      summary: List inventory items
      responses:
        "200":
          description: List of inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"
    post:
      operationId: createInventoryItem
      tags: [inventory]
      summary: Create an inventory item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryItemInput"
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  /inventory/{id}:
    patch:
      operationId: updateInventoryItem
      tags: [inventory]
      summary: Update an inventory item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryItemUpdate"
      responses:
        "200":
          description: Item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteInventoryItem
      tags: [inventory]
      summary: Delete an inventory item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /shipments:
    get:
      operationId: listShipments
      tags: [shipments]
      summary: List shipments
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [in_progress, complete, pending]
        - name: client
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of shipments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Shipment"
    post:
      operationId: createShipment
      tags: [shipments]
      summary: Create a shipment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShipmentInput"
      responses:
        "201":
          description: Shipment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shipment"

  /shipments/{id}:
    patch:
      operationId: updateShipment
      tags: [shipments]
      summary: Update a shipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShipmentUpdate"
      responses:
        "200":
          description: Shipment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shipment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteShipment
      tags: [shipments]
      summary: Delete a shipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Shipment deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /shipments/{id}/status:
    patch:
      operationId: updateShipmentStatus
      tags: [shipments]
      summary: Update shipment status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShipmentStatusUpdate"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shipment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bad-trays:
    get:
      operationId: getBadTraysAnalysis
      tags: [bad-trays]
      summary: Get bad trays analysis with aggregated issues and manual entries
      responses:
        "200":
          description: Bad trays analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadTraysAnalysis"

  /bad-trays/manual-checks:
    post:
      operationId: createBadTrayEntry
      tags: [bad-trays]
      summary: Create a bad tray manual check entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BadTrayEntryInput"
      responses:
        "201":
          description: Entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManualCheck"

  /layout:
    get:
      operationId: getLayout
      tags: [layout]
      summary: Get full facility layout (rooms → channels → racks → trays)
      responses:
        "200":
          description: Full layout
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoomItem"

  /layout/channels:
    post:
      operationId: createChannel
      tags: [layout]
      summary: Create a channel in a room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChannelInput"
      responses:
        "201":
          description: Channel created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelItem"

  /layout/channels/{id}:
    patch:
      operationId: updateChannel
      tags: [layout]
      summary: Rename or reorder a channel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChannelInput"
      responses:
        "200":
          description: Channel updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelItem"
    delete:
      operationId: deleteChannel
      tags: [layout]
      summary: Delete a channel (cascades racks/trays)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Channel deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /layout/channels/{id}/monitoring:
    patch:
      operationId: updateChannelMonitoring
      tags: [layout]
      summary: Save monitoring API URLs for a channel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MonitoringApiInput"
      responses:
        "200":
          description: Monitoring config updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelMonitoringItem"

  /layout/racks:
    post:
      operationId: createRack
      tags: [layout]
      summary: Create a rack in a channel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRackInput"
      responses:
        "201":
          description: Rack created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RackItem"

  /layout/resolve:
    get:
      operationId: resolveLayoutQr
      tags: [layout]
      summary: Resolve a layout QR payload to channel monitoring config
      parameters:
        - name: room
          in: query
          required: true
          schema:
            type: string
          description: Room name (seeding, fertigation, harvesting)
        - name: channel
          in: query
          required: true
          schema:
            type: string
          description: Channel label
        - name: rack
          in: query
          required: false
          schema:
            type: string
          description: Optional rack label
      responses:
        "200":
          description: Resolved channel monitoring config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelResolved"
        "404":
          description: Room or channel not found

  /layout/racks/{id}/tray-count:
    patch:
      operationId: setRackTrayCount
      tags: [layout]
      summary: Set the number of trays in a rack (creates or deletes to match target count)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetTrayCountInput"
      responses:
        "200":
          description: Tray count updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrayCountResult"

  /layout/racks/{id}:
    patch:
      operationId: updateRack
      tags: [layout]
      summary: Rename or reorder a rack
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRackInput"
      responses:
        "200":
          description: Rack updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RackItem"
    delete:
      operationId: deleteRack
      tags: [layout]
      summary: Delete a rack (cascades trays)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rack deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /layout/trays:
    post:
      operationId: createTray
      tags: [layout]
      summary: Create a tray in a rack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTrayInput"
      responses:
        "201":
          description: Tray created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrayItem"

  /layout/trays/{id}:
    delete:
      operationId: deleteTray
      tags: [layout]
      summary: Delete a tray
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tray deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    GrowthProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        seedName:
          type: string
        germinationDays:
          type: integer
        fertigationDays:
          type: integer
      required: [id, name, seedName, germinationDays, fertigationDays]

    SeedLot:
      type: object
      properties:
        id:
          type: integer
        qrCode:
          type: string
        seedName:
          type: string
        supplier:
          type: ["string", "null"]
        productLink:
          type: ["string", "null"]
        itemNumber:
          type: ["string", "null"]
        vendorShort:
          type: ["string", "null"]
        gpcCode:
          type: ["string", "null"]
        type:
          type: ["string", "null"]
        success:
          type: ["string", "null"]
        growTime:
          type: ["string", "null"]
        usedIn:
          type: ["string", "null"]
        currentlyGrown:
          type: ["boolean", "null"]
      required: [id, qrCode, seedName]

    ManualCheck:
      type: object
      properties:
        id:
          type: integer
        cycleId:
          type: integer
        fullTrays:
          type: integer
        halfTrays:
          type: integer
        isBadTrays:
          type: boolean
        issue:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        photoUrls:
          type: array
          items:
            type: string
        createdBy:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required: [id, cycleId, fullTrays, halfTrays, isBadTrays, photoUrls, createdAt]

    Cycle:
      type: object
      properties:
        id:
          type: integer
        shortId:
          type: string
        seedLotQrCodes:
          type: array
          items:
            type: string
        seedName:
          type: string
        fullTrays:
          type: integer
        halfTrays:
          type: integer
        seedWeightTray:
          type: number
        growthProfileId:
          type: integer
        growthProfileName:
          type: string
        germinationDays:
          type: integer
        fertigationDays:
          type: integer
        seedingDate:
          type: string
        status:
          type: string
          enum: [germination, fertigation, harvest, completed]
        trayPosition:
          type: ["string", "null"]
        germinationStartedAt:
          type: ["string", "null"]
          format: date-time
        fertigationStartedAt:
          type: ["string", "null"]
          format: date-time
        harvestStartedAt:
          type: ["string", "null"]
          format: date-time
        harvestedQty:
          type: ["number", "null"]
        closedAt:
          type: ["string", "null"]
          format: date-time
        createdBy:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        daysOverdueFertigation:
          type: ["integer", "null"]
        daysOverdueHarvest:
          type: ["integer", "null"]
      required:
        - id
        - shortId
        - seedLotQrCodes
        - seedName
        - fullTrays
        - halfTrays
        - seedWeightTray
        - growthProfileId
        - growthProfileName
        - germinationDays
        - fertigationDays
        - seedingDate
        - status
        - createdAt

    CycleDetail:
      allOf:
        - $ref: "#/components/schemas/Cycle"
        - type: object
          properties:
            manualChecks:
              type: array
              items:
                $ref: "#/components/schemas/ManualCheck"
          required: [manualChecks]

    CreateCycleRequest:
      type: object
      properties:
        seedLotQrCodes:
          type: array
          items:
            type: string
          minItems: 1
        seedName:
          type: string
        fullTrays:
          type: integer
        halfTrays:
          type: integer
        seedWeightTray:
          type: number
        growthProfileId:
          type: integer
        seedingDate:
          type: string
        trayPosition:
          type: string
        humidity:
          type: number
        temperature:
          type: number
        ph:
          type: number
        waterLevel:
          type: number
        nutrientMix:
          type: string
      required:
        - seedLotQrCodes
        - seedName
        - fullTrays
        - halfTrays
        - seedWeightTray
        - growthProfileId
        - seedingDate
        - trayPosition

    MoveFertigationRequest:
      type: object
      properties:
        seedLotQrCode:
          type: string
        humidity:
          type: number
        temperature:
          type: number
        ph:
          type: number
        waterLevel:
          type: number
        nutrientMix:
          type: string
      required: [seedLotQrCode]

    CompleteHarvestRequest:
      type: object
      properties:
        fullTrays:
          type: integer
        halfTrays:
          type: integer
        harvestedQty:
          type: number
        trayQrCode:
          type: string
      required: [fullTrays, halfTrays, harvestedQty, trayQrCode]

    CreateManualCheckRequest:
      type: object
      properties:
        fullTrays:
          type: integer
        halfTrays:
          type: integer
        isBadTrays:
          type: boolean
        issue:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        photoUrls:
          type: array
          items:
            type: string
      required: [fullTrays, halfTrays, isBadTrays, photoUrls]

    SensorStatus:
      type: object
